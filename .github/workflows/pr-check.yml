name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Write stub environment config
        run: |
          mkdir -p frontend/src/environments
          cat > frontend/src/environments/environment.ts <<'EOF'
          export const environment = {
            production: false,
            apiUrl: '/api',
            userPoolId: 'stub',
            userPoolClientId: 'stub',
            region: 'us-east-1',
          };
          EOF
          cat > frontend/src/environments/environment.prod.ts <<'EOF'
          export const environment = {
            production: true,
            apiUrl: '/api',
            userPoolId: 'stub',
            userPoolClientId: 'stub',
            region: 'us-east-1',
          };
          EOF

      - name: Build frontend
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Install CDK dependencies
        working-directory: cdk
        run: npm install

      - name: CDK Synth (validate stack)
        working-directory: cdk
        run: npx cdk synth --quiet
