<footer class="footer">
  <!-- Accent Line -->
  <div class="footer__accent"></div>

  <div class="container">
    <div class="footer__grid">
      <!-- Brand Column -->
      <div class="footer__brand">
        <img [src]="site.logo" [alt]="site.name" class="footer__logo" />
        <p class="footer__tagline">{{ site.tagline }}</p>
        <div class="footer__social">
          <a [href]="site.social.facebook" target="_blank" rel="noopener" aria-label="Facebook">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/>
            </svg>
          </a>
          <a [href]="site.social.instagram" target="_blank" rel="noopener" aria-label="Instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="20" height="20" rx="5"/>
              <circle cx="12" cy="12" r="5"/>
              <circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- Quick Links -->
      <div class="footer__col">
        <h4 class="footer__heading">Quick Links</h4>
        <nav class="footer__links">
          <a routerLink="/">Home</a>
          <a routerLink="/about">About</a>
          <a routerLink="/services">Services</a>
          <a routerLink="/financing">Financing</a>
          <a routerLink="/contact">Contact</a>
        </nav>
      </div>

      <!-- Inventory -->
      <div class="footer__col">
        <h4 class="footer__heading">Inventory</h4>
        <nav class="footer__links">
          @for (cat of categories; track cat.slug) {
            <a [routerLink]="'/inventory/' + cat.slug">{{ cat.name }}</a>
          }
        </nav>
      </div>

      <!-- Contact -->
      <div class="footer__col">
        <h4 class="footer__heading">Contact</h4>
        <div class="footer__contact">
          <div class="footer__contact-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
              <circle cx="12" cy="10" r="3"/>
            </svg>
            <span>{{ site.address.full }}</span>
          </div>
          <div class="footer__contact-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
            </svg>
            <a [href]="'tel:' + site.phone">{{ site.phoneFormatted }}</a>
          </div>
          <div class="footer__contact-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span>{{ site.hours }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="footer__bottom">
      <p>&copy; {{ currentYear }} {{ site.name }}. All rights reserved.</p>
    </div>
  </div>
</footer>
