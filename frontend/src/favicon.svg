<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2029"/>
      <stop offset="100%" stop-color="#0c0f12"/>
    </linearGradient>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a6cb3"/>
      <stop offset="50%" stop-color="#2b4a8e"/>
      <stop offset="100%" stop-color="#1a3270"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2ea3f2"/>
      <stop offset="100%" stop-color="#5bb8f5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- Border accent -->
  <rect x="1" y="1" width="62" height="62" rx="11" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4"/>
  <!-- Bold V -->
  <text x="32" y="48" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="46" fill="url(#vGrad)" letter-spacing="-2">V</text>
  <!-- Accent underline -->
  <rect x="16" y="52" width="32" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
